# Tema do RecrutaMe — paleta "terracota / walnut" (tons quentes de marrom).
# Streamlit usa UM tema por vez; abaixo o tema CLARO como padrão.
# A paleta completa (CSS custom properties) vive em app/tema.py::CSS_PALETA
# e é injetada globalmente por tema.aplicar_estilo_global().
[theme]
primaryColor = "#8b5e34"          # toffee-brown — botões, links, foco
backgroundColor = "#ffedd8"       # antique-white — fundo da app
secondaryBackgroundColor = "#f3d5b5"  # soft-apricot — cards / topo
textColor = "#583101"             # walnut-3 — texto principal
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
